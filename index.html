<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brito Mobile | Genuine Phones, Laptops & Accessories</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
       
        .logo-font { font-family: 'Space Grotesk', sans-serif; font-weight: 700; letter-spacing: -0.04em; }
        .heading-font { font-family: 'Inter', system-ui, sans-serif; font-weight: 700; letter-spacing: -0.025em; }
        .hero-bg { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%); }
        
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-8px); }
        
        .live-scroll { display: flex; gap: 1.25rem; overflow-x: auto; padding-bottom: 1rem; scrollbar-width: none; scroll-behavior: smooth; }
        .live-scroll::-webkit-scrollbar { display: none; }
        
        .similar-scroll { display: flex; flex-direction: column; gap: 1rem; max-height: 420px; overflow-y: auto; padding-right: 8px; scrollbar-width: thin; }
        .similar-scroll::-webkit-scrollbar { width: 6px; }
        .similar-scroll::-webkit-scrollbar-thumb { background: #34C759; border-radius: 20px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 60000; align-items: center; justify-content: center; padding: 16px; }
        .modal-content { background: white; border-radius: 24px; width: 100%; max-width: 1100px; max-height: 95vh; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }

        .search-glow { position: relative; }
        .search-glow::before {
            content: ''; position: absolute; inset: -4px;
            background: linear-gradient(90deg, #000000, #34C759, #ffffff, #34C759, #000000);
            background-size: 300% 300%; border-radius: 9999px; z-index: -1;
            animation: glowMove 4s linear infinite; opacity: 0.85; filter: blur(12px);
        }
        @keyframes glowMove { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

        /* FIXED: Large, visible search dropdown on portrait mobile */
        .search-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: #18181b;
            border: 1px solid #3f3f46;
            border-radius: 20px;
            margin-top: 8px;
            max-height: 520px;
            overflow-y: auto;
            z-index: 100;
            box-shadow: 0 20px 30px -5px rgb(0 0 0 / 0.6);
            display: none;
        }
        .search-item {
            padding: 18px 20px;
            display: flex;
            gap: 18px;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid #27272a;
        }
        .search-item:last-child { border-bottom: none; }
        .search-item:hover { background: #27272a; }
        .search-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 14px;
            flex-shrink: 0;
        }
        .search-item .name {
            font-weight: 600;
            font-size: 1.1rem;
            line-height: 1.3;
            color: white;
        }

        .blink-live { animation: blink 1.2s infinite; color: #ff0000; font-weight: 700; text-shadow: 0 0 10px #ff0000; }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        .menu-popup {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 70000;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <!-- NAVBAR -->
    <nav class="bg-black/90 backdrop-blur-md sticky top-0 z-50 border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 py-5">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3" id="logo-container"></div>
                
                <!-- Search - Full width on mobile, no shrink -->
                <div class="flex-1 mx-2 search-glow relative">
                    <div class="relative">
                        <input id="search-input" type="text" placeholder="Search phones, laptops..." 
                               onkeyup="handleSearch(event)"
                               class="w-full bg-zinc-900 text-white border border-zinc-700 focus:border-[#34C759] rounded-3xl py-4 pl-12 pr-6 text-base focus:outline-none">
                        <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-zinc-400 text-xl"></i>
                    </div>
                    <div id="search-dropdown" class="search-dropdown"></div>
                </div>

                <!-- Desktop Nav -->
                <div class="hidden md:flex items-center gap-6 text-sm font-medium">
                    <a href="#" onclick="openCompareModal()" class="hover:text-[#34C759]">Compare Devices</a>
                    <a href="tel:+260961971085" class="flex items-center gap-3 px-6 py-3 rounded-3xl font-semibold bg-red-600 hover:bg-red-700 transition-all">
                        <i class="fa-solid fa-phone-volume text-xl"></i> Call Now
                    </a>
                    <button onclick="openBasketModal()" class="flex items-center gap-2 hover:text-[#34C759]">
                        <i class="fa-solid fa-shopping-basket text-xl"></i>
                        <span>My Basket</span>
                        <span id="nav-basket-count" class="bg-[#34C759] text-black text-xs font-bold px-2 py-0.5 rounded-full">0</span>
                    </button>
                </div>

                <!-- Mobile Hamburger -->
                <div class="md:hidden flex items-center gap-3">
                    <a href="tel:+260961971085" class="w-11 h-11 flex items-center justify-center rounded-2xl text-2xl bg-red-600">
                        <i class="fa-solid fa-phone-volume"></i>
                    </a>
                    <button onclick="toggleMainMenu()" class="text-3xl text-white">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- LIVE BANNER -->
    <div class="bg-black border-b border-red-500 py-3 px-6 text-center text-sm font-medium flex items-center justify-center gap-3">
        <span class="blink-live text-xl">🔴 LIVE</span>
        <span class="text-white">All purchases & transactions MUST be done at the branch in Kabwe • No online sales or delivery</span>
    </div>

    <!-- HERO, SHOP, WHY US, ABOUT sections remain the same as previous version -->

    <!-- MAIN MENU POPUP (☰) -->
    <div id="main-menu-popup" class="menu-popup">
        <div class="bg-zinc-900 rounded-3xl w-full max-w-md p-8 text-white">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold">Menu</h2>
                <button onclick="toggleMainMenu()" class="text-4xl">×</button>
            </div>
            <div class="flex flex-col gap-6 text-lg font-medium">
                <a href="#" onclick="openQuickOrderModal(); toggleMainMenu()" class="hover:text-[#34C759]">Quick Order</a>
                <a href="#" onclick="showServices(); toggleMainMenu()" class="hover:text-[#34C759]">Other Services</a>
                <a href="#shop" onclick="toggleMainMenu()" class="hover:text-[#34C759]">Shop</a>
                <a href="#why-us" onclick="toggleMainMenu()" class="hover:text-[#34C759]">Why Choose Us</a>
                <a href="#about" onclick="toggleMainMenu()" class="hover:text-[#34C759]">About Us</a>
                <a href="https://web.facebook.com/profile.php?id=100051715276179" target="_blank" onclick="toggleMainMenu()" class="hover:text-[#34C759] flex items-center gap-3">
                    <i class="fa-brands fa-facebook text-2xl"></i> Official Facebook Page
                </a>
            </div>
        </div>
    </div>

    <!-- Compare Modal with built-in search (same style as main search) -->
    <div id="compare-modal" class="modal">
        <div class="modal-content" style="max-width: 1100px;">
            <div class="flex justify-between items-center p-6 border-b bg-zinc-900 text-white">
                <h2 class="heading-font text-3xl font-bold">Compare Devices</h2>
                <button onclick="closeCompareModal()" class="text-4xl">×</button>
            </div>
            <div class="p-8 bg-white text-black">
                <input id="compare-search" type="text" placeholder="Type to search devices..." 
                       onkeyup="filterCompareOptions()" 
                       class="w-full p-4 border border-gray-300 rounded-2xl mb-6 text-lg">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label class="block text-sm font-medium mb-2">Device 1</label>
                        <select id="compare1" class="w-full p-4 border border-gray-300 rounded-2xl text-lg"></select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Device 2</label>
                        <select id="compare2" class="w-full p-4 border border-gray-300 rounded-2xl text-lg"></select>
                    </div>
                </div>
                <button onclick="performComparison()" class="w-full mt-8 bg-[#34C759] hover:bg-[#2E9E4B] text-black py-4 rounded-2xl font-semibold text-lg">
                    Compare Now
                </button>
                <div id="comparison-result" class="hidden mt-8"></div>
            </div>
        </div>
    </div>

    <!-- Rest of your modals (product, basket, services, quick order) - same as before -->

    <script>
        // ... (keep all your existing variables, loadData, render functions, addToBasket, showProductDetail, etc.)

        // Improved mobile-friendly search dropdown
        function handleSearch(e) {
            const term = e.target.value.toLowerCase().trim();
            const dropdown = document.getElementById('search-dropdown');
            if (!term) {
                dropdown.style.display = 'none';
                return;
            }
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term)).slice(0, 12);
            let html = '';
            filtered.forEach(product => {
                html += `
                    <div class="search-item" onclick="selectSearchResult(${JSON.stringify(product).replace(/"/g, '&quot;')})">
                        <img src="${product.img}" onerror="this.src='https://via.placeholder.com/400x300/34C759/white?text=${encodeURIComponent(product.name)}'">
                        <div>
                            <p class="name">${product.name}</p>
                            <p class="text-[#34C759] font-semibold">K${product.price.toLocaleString()}</p>
                        </div>
                    </div>
                `;
            });
            dropdown.innerHTML = html || `<div class="p-12 text-center text-zinc-400">No results</div>`;
            dropdown.style.display = 'block';
        }

        function selectSearchResult(product) {
            document.getElementById('search-dropdown').style.display = 'none';
            document.getElementById('search-input').value = '';
            showProductDetail(product);
        }

        // Compare modal with search filter
        function filterCompareOptions() {
            const term = document.getElementById('compare-search').value.toLowerCase().trim();
            const phones = products.filter(p => p.category === "phone");
            const filtered = term ? phones.filter(p => p.name.toLowerCase().includes(term)) : phones;
            
            const s1 = document.getElementById('compare1');
            const s2 = document.getElementById('compare2');
            s1.innerHTML = s2.innerHTML = '<option value="">Select Device</option>';
            filtered.forEach(p => {
                s1.innerHTML += `<option value="${p.id}">${p.name}</option>`;
                s2.innerHTML += `<option value="${p.id}">${p.name}</option>`;
            });
        }

        function performComparison() {
            const id1 = document.getElementById('compare1').value;
            const id2 = document.getElementById('compare2').value;
            if (!id1 || !id2) return alert("Select two devices");
            if (id1 === id2) return alert("Choose two different devices");
            // existing comparison logic...
        }

        function toggleMainMenu() {
            const popup = document.getElementById('main-menu-popup');
            popup.style.display = popup.style.display === 'flex' ? 'none' : 'flex';
        }

        // Close dropdown when tapping outside
        document.addEventListener('click', function(e) {
            const dropdown = document.getElementById('search-dropdown');
            if (!e.target.closest('.search-glow')) dropdown.style.display = 'none';
        });

        window.onload = loadData;
    </script>
</body>
</html>
