<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brito Mobile</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body { background:#09090b; color:white; font-family: Inter, sans-serif; }
.call-now-btn {
    background: linear-gradient(90deg,#34C759,#2E9E4B);
    color:#000; font-weight:700;
    border-radius:999px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="bg-black/90 sticky top-0 z-50 border-b border-white/10">
<div class="max-w-7xl mx-auto px-6 py-4">

<div class="flex items-center justify-between">

<!-- LOGO -->
<h1 class="text-2xl font-bold">Brito Mobile</h1>

<!-- 🔥 CPAESS SEARCH (DESKTOP) -->
<div class="flex-1 max-w-md mx-8 hidden md:flex">
    <div class="relative w-full">
        <input type="text" id="search-input"
               placeholder="Search products..."
               class="w-full bg-zinc-800 border border-zinc-700 focus:border-orange-500 rounded-3xl py-3 px-5 pl-12 text-sm focus:outline-none"
               onkeyup="handleSearch(event)">
        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"></i>
    </div>
</div>

<!-- RIGHT SIDE -->
<div class="flex items-center gap-4">

<!-- 🔥 MOBILE SEARCH BUTTON (CPAESS STYLE) -->
<button onclick="focusSearch()" class="md:hidden text-lg">
<i class="fa-solid fa-magnifying-glass"></i>
</button>

<a href="tel:+260961971085" class="call-now-btn px-5 py-2 flex items-center gap-2">
<i class="fa-solid fa-phone"></i> Call
</a>

<button onclick="toggleMobileMenu()">
<i class="fa-solid fa-bars text-xl"></i>
</button>

</div>
</div>

<!-- 🔥 CPAESS SEARCH (MOBILE) -->
<div class="md:hidden mt-4">
    <div class="relative">
        <input type="text" id="search-input-mobile"
               placeholder="Search products..."
               class="w-full bg-zinc-800 border border-zinc-700 focus:border-orange-500 rounded-3xl py-3 px-5 pl-12 text-sm focus:outline-none"
               onkeyup="handleSearch(event)">
        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"></i>
    </div>
</div>

</div>
</nav>

<!-- PRODUCTS -->
<section class="p-6">
<h2 class="text-3xl mb-6">Products</h2>
<div id="products" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
</section>

<script>

// SAMPLE PRODUCTS
let products = [
{name:"iPhone 11", category:"phone"},
{name:"Samsung S21", category:"phone"},
{name:"HP Laptop", category:"laptop"},
{name:"Dell Laptop", category:"laptop"},
{name:"Charger", category:"accessory"}
];

let allProducts = [...products];

// RENDER
function renderProducts(list){
const container = document.getElementById('products');
container.innerHTML = "";

if(list.length === 0){
container.innerHTML = `<p class="text-gray-400">No products found</p>`;
return;
}

list.forEach(p=>{
container.innerHTML += `
<div class="bg-zinc-800 p-5 rounded-2xl">
<h3 class="text-lg font-semibold">${p.name}</h3>
<p class="text-sm text-gray-400">${p.category}</p>
</div>`;
});
}

// 🔥 CPAESS SEARCH LOGIC
function handleSearch(e){
const term = e.target.value.toLowerCase().trim();

if(!term){
renderProducts(allProducts);
return;
}

const filtered = allProducts.filter(p =>
p.name.toLowerCase().includes(term)
);

renderProducts(filtered);
}

// 🔥 CPAESS FOCUS FUNCTION
function focusSearch(){
if(window.innerWidth < 768){
document.getElementById('search-input-mobile').focus();
}else{
document.getElementById('search-input').focus();
}
}

// MOBILE MENU
function toggleMobileMenu(){
alert("menu here");
}

// INIT
renderProducts(products);

</script>

</body>
</html>
