<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brito Mobiles | Kabwe Zambia</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

/* ================= GLOBAL ================= */
body{
background:#0a0a0a;
color:white;
font-family:Inter,sans-serif;
margin:0;
padding:0;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.hidden{display:none;}

.btn{
padding:10px 15px;
border-radius:999px;
font-weight:bold;
cursor:pointer;
}

.call-btn{
background:#34C759;
color:black;
}

.whatsapp-btn{
background:#25D366;
color:black;
}

.card{
background:#18181b;
border-radius:20px;
padding:20px;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

input{
outline:none;
}

/* ================= NAV ================= */
nav{
position:sticky;
top:0;
background:black;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
border-bottom:1px solid #222;
}

.logo{
font-size:22px;
font-weight:bold;
}

.search-box{
flex:1;
margin:0 20px;
position:relative;
}

.search-box input{
width:100%;
padding:12px 15px 12px 40px;
border-radius:30px;
border:1px solid #333;
background:#18181b;
color:white;
}

.search-box i{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
color:gray;
}

.nav-actions{
display:flex;
gap:10px;
}

/* ================= HERO ================= */
.hero{
text-align:center;
padding:40px 20px;
}

.hero h1{
font-size:40px;
}

.hero p{
color:gray;
}

/* ================= CATEGORIES ================= */
.categories{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px 20px;
}

.category{
background:#18181b;
padding:10px 15px;
border-radius:999px;
cursor:pointer;
}

.category.active{
background:#f97316;
}

/* ================= GRID ================= */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

/* ================= FOOTER ================= */
footer{
background:#000;
padding:30px;
text-align:center;
color:gray;
}

</style>
</head>

<body>

<!-- ================= NAV ================= -->
<nav>
<div class="logo">Brito Mobiles</div>

<div class="search-box">
<input type="text" id="search" placeholder="Search products..." onkeyup="searchProducts()">
<i class="fa fa-search"></i>
</div>

<div class="nav-actions">
<button class="btn call-btn">Call</button>
<button class="btn whatsapp-btn">WhatsApp</button>
</div>
</nav>

<!-- MOBILE SEARCH -->
<div style="padding:10px;">
<input id="searchMobile" placeholder="Search..." style="width:100%;padding:12px;border-radius:30px;background:#18181b;border:1px solid #333;" onkeyup="searchProducts()">
</div>

<!-- HERO -->
<section class="hero">
<h1>Phones, Laptops & Gadgets</h1>
<p>Best Deals in Kabwe</p>
</section>

<!-- CATEGORIES -->
<div class="categories">
<div class="category active" onclick="filterCategory('all',this)">All</div>
<div class="category" onclick="filterCategory('phone',this)">Phones</div>
<div class="category" onclick="filterCategory('laptop',this)">Laptops</div>
<div class="category" onclick="filterCategory('accessory',this)">Accessories</div>
</div>

<!-- PRODUCTS -->
<div id="products" class="grid"></div>

<!-- ================= SCRIPT ================= -->
<script>

// ================= PRODUCTS =================
const products = [
{name:"iPhone 11",price:"K5500",category:"phone"},
{name:"iPhone 12",price:"K7000",category:"phone"},
{name:"Samsung S21",price:"K6800",category:"phone"},
{name:"Samsung A51",price:"K3200",category:"phone"},
{name:"Samsung A71",price:"K4000",category:"phone"},
{name:"HP Laptop",price:"K8000",category:"laptop"},
{name:"Dell Laptop",price:"K7200",category:"laptop"},
{name:"Lenovo ThinkPad",price:"K9000",category:"laptop"},
{name:"MacBook Air",price:"K15000",category:"laptop"},
{name:"Mouse",price:"K150",category:"accessory"},
{name:"Keyboard",price:"K250",category:"accessory"},
{name:"Headphones",price:"K300",category:"accessory"},
{name:"Charger",price:"K120",category:"accessory"}
];

let filteredProducts = [...products];

// ================= RENDER =================
function renderProducts(list){
const container = document.getElementById("products");
container.innerHTML="";

if(list.length===0){
container.innerHTML="<p>No products found</p>";
return;
}

list.forEach(p=>{
container.innerHTML+=`
<div class="card">
<h2>${p.name}</h2>
<p>${p.price}</p>

<div style="display:flex;gap:10px;margin-top:10px;">
<button class="btn whatsapp-btn">WhatsApp</button>
<button class="btn call-btn">Call</button>
</div>
</div>
`;
});
}

// ================= SEARCH =================
function searchProducts(){

let input1=document.getElementById("search").value.toLowerCase();
let input2=document.getElementById("searchMobile").value.toLowerCase();

let term=input1 || input2;

filteredProducts = products.filter(p =>
p.name.toLowerCase().includes(term)
);

renderProducts(filteredProducts);
}

// ================= FILTER =================
function filterCategory(cat,btn){

document.querySelectorAll(".category").forEach(c=>c.classList.remove("active"));
btn.classList.add("active");

if(cat==="all"){
filteredProducts=products;
}else{
filteredProducts=products.filter(p=>p.category===cat);
}

renderProducts(filteredProducts);
}

// ================= INIT =================
renderProducts(products);

</script>

<!-- ================= FOOTER ================= -->
<footer>
<p>© 2026 Brito Mobiles - Kabwe Zambia</p>
</footer>

</body>
</html>
