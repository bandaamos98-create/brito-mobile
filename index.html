// LOAD DATA
products = data.products;
staff = data.staff;

// RENDER PRODUCTS
function renderProducts() {
    const grid = document.getElementById("products-grid");
    grid.innerHTML = "";

    products.forEach(p => {
        grid.innerHTML += `
            <div class="product-card bg-white rounded-3xl p-4 shadow">
                <img src="${p.img}" class="w-full h-40 object-cover rounded-xl">
                <h3 class="font-bold mt-3">${p.name}</h3>
                <p class="text-gray-500 text-sm">${p.description}</p>
                <p class="text-emerald-600 font-bold mt-2">K${p.price}</p>
                <button onclick="openModal(${p.id})"
                    class="mt-3 w-full bg-emerald-400 text-black py-2 rounded-xl">
                    View
                </button>
            </div>
        `;
    });
}

// MODAL
function openModal(id) {
    const p = products.find(x => x.id === id);
    document.getElementById("product-modal").classList.remove("hidden");
    document.getElementById("modal-image").src = p.img;
    document.getElementById("modal-name").innerText = p.name;
    document.getElementById("modal-price").innerText = "K" + p.price;
    document.getElementById("modal-full-desc").innerText = p.fullDescription;
}

function closeModal() {
    document.getElementById("product-modal").classList.add("hidden");
}

// STAFF SLIDESHOW
function renderStaffSlideshow() {
    const container = document.getElementById("staff-slideshow");
    container.innerHTML = "";

    staff.forEach((s, i) => {
        container.innerHTML += `
            <div class="staff-slide ${i === 0 ? "active" : ""}">
                <img src="${s.img}" class="w-32 h-32 rounded-full mb-4">
                <h3 class="text-xl font-bold">${s.name}</h3>
                <p class="text-emerald-400">${s.role}</p>
                <p class="text-white/70 mt-2 text-center">${s.quote}</p>
            </div>
        `;
    });

    let index = 0;
    setInterval(() => {
        const slides = document.querySelectorAll(".staff-slide");
        slides.forEach(s => s.classList.remove("active"));
        index = (index + 1) % slides.length;
        slides[index].classList.add("active");
    }, 3000);
}

// INIT
renderProducts();
renderStaffSlideshow();

console.log("Products loaded:", products.length);
